repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff (lint)
        entry: /Users/electron/.local/bin/uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: /Users/electron/.local/bin/uv run ruff format
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: /Users/electron/.local/bin/uv run mypy
        language: system
        args: [--strict, --ignore-missing-imports]
        files: ^kiki_flow_core/
        pass_filenames: false
      - id: pytest-collect
        name: pytest collect (smoke)
        entry: bash -c '/Users/electron/.local/bin/uv run pytest --collect-only --no-cov; rc=$?; [ $rc -eq 0 ] || [ $rc -eq 2 ] || [ $rc -eq 5 ]'
        language: system
        pass_filenames: false
        stages: [pre-commit]
